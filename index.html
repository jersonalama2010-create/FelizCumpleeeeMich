<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para una persona especial 💝</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff758c, #ff7eb3, #ffd3a5);
            overflow: hidden;
            color: white;
            text-align: center;
        }

        .star { position: absolute; color: white; font-size: 10px; animation: brillar 2s infinite alternate; }
        @keyframes brillar { from { opacity: 0.2; } to { opacity: 0.8; } }

        #boton {
            padding: 18px 40px;
            font-size: 24px;
            border: none;
            border-radius: 50px;
            background: #ff2e63;
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 20;
        }

        #carta {
            display: none;
            max-width: 500px;
            font-size: 22px;
            line-height: 1.8;
            background: rgba(255, 255, 255, 0.15);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            z-index: 10;
        }

        #contenedorFinal {
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 15;
        }

        #mensajeFinal {
            font-size: 38px;
            font-weight: bold;
            text-shadow: 0 0 15px #ff4d6d;
            margin-bottom: 40px;
        }

        /* --- RAMO DE FLORES --- */
        .bouquet {
            position: relative;
            width: 200px;
            height: 150px;
        }

        .stem {
            position: absolute;
            bottom: 0;
            width: 4px;
            background: #4caf50;
            transform-origin: bottom center;
            animation: crecerTallo 2s ease-out forwards;
        }

        .flower-wrapper {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .flower-center {
            width: 15px;
            height: 15px;
            background: #ffeb3b;
            border-radius: 50%;
            z-index: 5;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            animation: florecer 0.5s 1.8s both;
        }

        .petal {
            position: absolute;
            width: 18px;
            height: 25px;
            border-radius: 50%;
            transform-origin: center 25px; /* Punto de rotación fijo en el centro */
            opacity: 0;
            animation: florecer 0.8s 2s ease-out forwards;
        }

        @keyframes crecerTallo { from { height: 0; } }
        @keyframes florecer { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* --- FUEGOS ARTIFICIALES --- */
        .firework {
            position: absolute;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            pointer-events: none;
        }

        .heart { position: absolute; bottom: -50px; font-size: 25px; animation: subir 6s linear infinite; }
        @keyframes subir { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-110vh); opacity: 0; } }
    </style>
</head>
<body>

    <button id="boton" onclick="iniciarSorpresa()">🎁 Ábrelo, princesa 💖</button>

    <div id="carta"></div>

    <div id="contenedorFinal">
        <div id="mensajeFinal">¡FELIZ CUMPLEAÑOS!<br>PRECIOSA DE MI CORAZÓN 💖</div>
        <div class="bouquet">
            <div class="stem" style="height:100px; left:60px; transform:rotate(-15deg)"><div class="flower-wrapper" id="f1"></div></div>
            <div class="stem" style="height:120px; left:98px;"><div class="flower-wrapper" id="f2"></div></div>
            <div class="stem" style="height:100px; left:136px; transform:rotate(15deg)"><div class="flower-wrapper" id="f3"></div></div>
        </div>
    </div>

    <audio id="musica" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3" type="audio/mpeg">
    </audio>

    <script>
        const textoCarta = "Hoy no solo celebramos tu cumpleaños, celebramos lo especial que eres... Gracias por existir, por tu luz y por hacer que cada día sea más bonito. Espero que este nuevo año esté lleno de sueños cumplidos y muchas razones para sonreír.";
        const colores = ["#ff4d6d", "#ff8fa3", "#ffb3c1"];

        function iniciarSorpresa() {
            document.getElementById("boton").style.display = "none";
            document.getElementById("musica").play().catch(() => {});
            
            const cartaDiv = document.getElementById("carta");
            cartaDiv.style.display = "block";
            
            let i = 0;
            function escribir() {
                if (i < textoCarta.length) {
                    cartaDiv.innerHTML += textoCarta[i];
                    i++;
                    setTimeout(escribir, 85); 
                } else {
                    setTimeout(transicionFinal, 2500);
                }
            }
            escribir();
        }

        function transicionFinal() {
            document.getElementById("carta").style.display = "none";
            document.getElementById("contenedorFinal").style.display = "flex";

            // Crear centros y pétalos pegados
            for (let f = 1; f <= 3; f++) {
                const wrapper = document.getElementById(`f${f}`);
                
                // Centro
                const center = document.createElement("div");
                center.className = "flower-center";
                wrapper.appendChild(center);

                // 8 Pétalos rotados perfectamente
                for (let p = 0; p < 8; p++) {
                    const petal = document.createElement("div");
                    petal.className = "petal";
                    petal.style.backgroundColor = colores[f-1];
                    petal.style.transform = `rotate(${p * 45}deg) translateY(-12px)`;
                    petal.style.animationDelay = `${2 + (p * 0.1)}s`;
                    wrapper.appendChild(petal);
                }
            }

            setInterval(crearCorazon, 400);
            setInterval(lanzarFuego, 800);
        }

        function lanzarFuego() {
            const x = Math.random() * 100;
            const y = Math.random() * 50 + 10;
            const color = `hsl(${Math.random() * 360}, 100%, 70%)`;

            for (let i = 0; i < 50; i++) {
                const p = document.createElement('div');
                p.className = 'firework';
                p.style.backgroundColor = color;
                p.style.left = x + 'vw';
                p.style.top = y + 'vh';
                p.style.boxShadow = `0 0 10px ${color}`;
                
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 150 + 50;
                
                document.body.appendChild(p);

                p.animate([
                    { transform: 'translate(0,0) scale(1)', opacity: 1 },
                    { transform: `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px) scale(0)`, opacity: 0 }
                ], { duration: 1500, easing: 'ease-out' }).onfinish = () => p.remove();
            }
        }

        function crearCorazon() {
            const h = document.createElement("div");
            h.className = "heart";
            h.innerHTML = "💖";
            h.style.left = Math.random() * 100 + "vw";
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 6000);
        }

        for(let i=0; i<50; i++){
            const s = document.createElement("div");
            s.className = "star"; s.innerHTML = "✦";
            s.style.left = Math.random()*100+"vw"; s.style.top = Math.random()*100+"vh";
            document.body.appendChild(s);
        }
    </script>
</body>
</html>
